name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  contracts:
    name: Foundry contract tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Install Forge standard library
        working-directory: contracts
        run: forge install foundry-rs/forge-std --shallow --no-git
      - name: Run contract test suite
        working-directory: contracts
        run: forge test

  test:
    name: PQ signing + integrity tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install runtime deps
        # Tests import src.pq_signing (quantcrypt) and src.orders
        # (cryptography), so we install the pinned runtime requirements.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run PQ signing test suite
        run: python tests/test_pq_signing.py

      - name: Run Monad TX test suite
        run: python tests/test_monad_tx.py

      - name: Verify shipped signed orders + audit-log chain integrity
        # signed_orders.json + audit_log.jsonl are shipped as reproducibility
        # artefacts. The signed-orders file proves every embedded order
        # verifies against its embedded public key under all three signature
        # schemes; the audit log proves the hash-chain is intact. A reviewer
        # who clones the repo can verify both offline.
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from src import orders
          for s in orders.load_signed_orders():
              assert orders.verify_signed_order(s), s.order.order_id
              print('verified', s.order.order_id, 'pools=', s.order.pools)
          ok, n, reason = orders.verify_audit_chain()
          assert ok, f'audit chain broken: {reason}'
          print(f'audit chain intact: {n} entries')
          "

  imports:
    name: source imports cleanly on Python 3.12
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: |
          python -c "
          import importlib
          for m in ['src.pq_signing', 'src.orders', 'src.problem',
                   'src.solvers', 'src.qaoa_hw', 'src.xy_qaoa',
                   'src.ai_forecast', 'src.backtest', 'src.data',
                   'src.defi_data', 'src.hardware']:
              importlib.import_module(m)
              print(f'imports OK: {m}')
          import py_compile; py_compile.compile('app.py', doraise=True)
          print('app.py compiles OK')
          "
