[profile.default]
src      = "src"
out      = "out"
libs     = ["lib"]
test     = "test"
script   = "script"
solc     = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir   = true                       # routing vault has deep stack in executeAndRoute
evm_version = "cancun"
fuzz = { runs = 256 }
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
